name: bundadini
description: Aplikasi Monitoring Ibu Hamil
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.1.0

  # Extra UI
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  equatable: ^2.0.5

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.0

  # UI
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # PDF
  pdf: ^3.10.8
  printing: ^5.14.3

  # Excel
  excel: ^4.0.2
  path_provider: ^2.1.3
  share_plus: ^12.0.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.jpg"